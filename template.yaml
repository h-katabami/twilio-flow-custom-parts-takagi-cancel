AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TakagiCancel flow custom parts (SAM)

Parameters:
  FunctionName:
    Type: String
    Default: TwilioCustomParts-TakagiCancel
  RoleName:
    Type: String
    Default: TwilioCustomParts-TakagiCancel-role
  TableNameParameterPath:
    Type: String
    Default: /dynamodb/takagi/customer-data
  BusinessHoursStart:
    Type: String
    Default: '08:30'
  BusinessHoursEnd:
    Type: String
    Default: '18:00'
  ProxyFunctionName:
    Type: String
    Default: TwilioCustomProxy-TakagiCancel
  ProxyRoleName:
    Type: String
    Default: TwilioCustomProxy-TakagiCancel-role

  CustomerDataBucketName:
    Type: String
    Default: twilio.tact-dev.jp
    Description: ダウンロードCSVを置く既存の S3 バケット名
  DownloadSourceTableName:
    Type: String
    Default: TestTwilioFlow-MainTable-S5QH2KQ9XG4N
    Description: 通話ログのテーブル名（ManagementScreenIndex を持つもの）
  CustomerDataCompany:
    Type: String
    Default: takagi-cancel
    Description: 通話ログの PK に使う会社名（PK = CompanyName#<この値>）
  DownloadUrlExpiresSeconds:
    Type: String
    Default: '900'

Resources:
  TwilioCustomPartsTakagiCancelRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      Path: /service-role/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: TwilioCustomPartsTakagiCancelDataAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:GetItem
                Resource:
                  - !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/*
                  - !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/*/index/*
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource:
                  - !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${TableNameParameterPath}

  TwilioCustomPartsTakagiCancelFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Ref FunctionName
      Description: TakagiCancel flow custom parts lambda
      Role: !GetAtt TwilioCustomPartsTakagiCancelRole.Arn
      CodeUri: lambdas
      Handler: TwilioCustomParts.lambda_function.lambda_handler
      Runtime: python3.12
      Timeout: 10
      MemorySize: 128
      Architectures:
        - x86_64
      Environment:
        Variables:
          TABLE_NAME_PARAMETER_PATH: !Ref TableNameParameterPath
          BUSINESS_HOURS_START: !Ref BusinessHoursStart
          BUSINESS_HOURS_END: !Ref BusinessHoursEnd

  TwilioCustomProxyTakagiCancelRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref ProxyRoleName
      Path: /service-role/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: TwilioCustomProxyTakagiCancelDownloadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:GetItem
                Resource:
                  - !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DownloadSourceTableName}
                  - !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DownloadSourceTableName}/index/*
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource:
                  - !Sub arn:${AWS::Partition}:s3:::${CustomerDataBucketName}/${CustomerDataCompany}/download/*

  TwilioCustomProxyTakagiCancelFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Ref ProxyFunctionName
      Description: TakagiCancel customer data download API
      Role: !GetAtt TwilioCustomProxyTakagiCancelRole.Arn
      CodeUri: lambdas
      Handler: TwilioCustomProxy.lambda_function.lambda_handler
      Runtime: python3.12
      Timeout: 28
      MemorySize: 512
      Architectures:
        - x86_64
      Environment:
        Variables:
          CUSTOMER_DATA_BUCKET_NAME: !Ref CustomerDataBucketName
          DOWNLOAD_SOURCE_TABLE_NAME: !Ref DownloadSourceTableName
          CUSTOMER_DATA_COMPANY: !Ref CustomerDataCompany
          DOWNLOAD_URL_EXPIRES_SECONDS: !Ref DownloadUrlExpiresSeconds

Outputs:
  FunctionName:
    Description: Lambda function name
    Value: !Ref TwilioCustomPartsTakagiCancelFunction
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt TwilioCustomPartsTakagiCancelFunction.Arn
  ProxyFunctionName:
    Description: Download API lambda function name
    Value: !Ref TwilioCustomProxyTakagiCancelFunction
  ProxyFunctionArn:
    Description: Download API lambda function ARN
    Value: !GetAtt TwilioCustomProxyTakagiCancelFunction.Arn
